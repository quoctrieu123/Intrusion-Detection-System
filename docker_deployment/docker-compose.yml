version: '3.8'

# Định nghĩa mạng nội bộ cho các container giao tiếp với nhau
networks:
  nids_net:
    driver: bridge

# Định nghĩa không gian lưu trữ bền vững
volumes:
  influxdb_data:
  grafana_data:

services:
  # 1. Zookeeper (Bắt buộc để quản lý Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - nids_net

  # 2. Message Broker (Nhận stream data)
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092" # Expose cổng 9092 ra máy host để Data Generator đẩy dữ liệu vào
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Cấu hình listener để host (localhost) và các container khác đều kết nối được
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - nids_net

  # 3. Time-series Database (Lưu kết quả dự đoán)
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
    environment:
      # Tự động khởi tạo user và database (bucket)
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=nids_org
      - DOCKER_INFLUXDB_INIT_BUCKET=nids_bucket
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=nids-super-secret-token-12345
    networks:
      - nids_net

  # 4. Monitoring Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - nids_net